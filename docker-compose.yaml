services:
  dogecoin-fullnode:
    build: .
    container_name: dogecoin-fullnode
    restart: unless-stopped
    cpus: 1.0
    mem_limit: "2048M"
    stop_signal: SIGINT
    stop_grace_period: 2m # wait 2m before sending SIGKILL
    command:
      - "-testnet"
      - "-datadir=/blockchain/data"
      - "-rpcallowip=172.19.0.0/16"
      - "-rpcuser=user"
      - "-rpcpassword=password123"
      - "-printtoconsole=1"
      - "-prune=2500"
      - "-txconfirmtarget=2"
      - "-onlynet=ipv4"
    ports:
      - "44555:44555"
      - "44556:44556"
    volumes:
      - ./blockchain-data:/blockchain/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
